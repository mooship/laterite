name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Cache Astro
        uses: actions/cache@v5
        with:
          path: node_modules/.astro
          key: ${{ runner.os }}-astro-${{ hashFiles('package-lock.json', 'astro.config.*', 'tsconfig*.json') }}
          restore-keys: |
            ${{ runner.os }}-astro-
      - run: npm run build
      - run: npm test
